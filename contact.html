<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Brendah Namurema</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- Navigation -->
    <header class="header">
        <div class="logo">
           Namurema <span class="highlight">Brendah</span>
        </div>
        <nav class="nav">
            <a href="index.html" class="nav-link">Home</a>
            <a href="projects.html" class="nav-link">Projects</a>
            <a href="contact.html" class="nav-link active">Contact</a>
        </nav>
        <div class="social-icons">
            <a href="https://www.linkedin.com/in/brenda-namurema-421119208/" class="icon-link">
                <img src="assets/icons/linkedin-svgrepo-com.svg" alt="LinkedIn">
            </a>
            <a href="https://github.com/Namurema" class="icon-link">
                <img src="assets/icons/github-svgrepo-com.svg" alt="Github">
            </a>
            <a href="mailto:namuremabrendah@gmail.com" class="icon-link">
                <img src="assets/icons/email-svgrepo-com.svg" alt="Email">
            </a>
        </div>
    </header>

    <!-- Contact Hero Section -->
    <section class="contact-hero">
        <div class="contact-hero-content">
            <span class="section-label">GET IN TOUCH</span>
            <h1 class="contact-main-title">Contact Me</h1>
            
        </div>
    </section>

    <!-- Contact Content Section -->
    <section class="contact-content">
        <div class="contact-container">
            
            <!-- Contact Information -->
            <div class="contact-info">
                <h2 class="contact-info-title">Contact Information</h2>
                
                <div class="contact-item">
                    <div class="contact-icon email-icon">
                        <span>📧</span>
                    </div>
                    <div class="contact-details">
                        <h3 class="contact-label">Email</h3>
                        <p class="contact-value">namuremabrendah@gmail.com</p>
                    </div>
                </div>
                
                <div class="contact-item">
                    <div class="contact-icon phone-icon">
                        <span>📞</span>
                    </div>
                    <div class="contact-details">
                        <h3 class="contact-label">Phone</h3>
                        <p class="contact-value">+256 701 276 477</p>
                    </div>
                </div>
                
                <div class="contact-item">
                    <div class="contact-icon location-icon">
                        <span>📍</span>
                    </div>
                    <div class="contact-details">
                        <h3 class="contact-label">Location</h3>
                        <p class="contact-value">Kampala, Uganda</p>
                    </div>
                </div>
                
            </div>
            
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <p class="footer-text">© 2026 Namurema Brendah. All rights reserved.</p>
