<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <!-- Wood-grain blurred background -->
    <linearGradient id="wood1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  style="stop-color:#5c3a1e"/>
      <stop offset="30%" style="stop-color:#7a4f2d"/>
      <stop offset="55%" style="stop-color:#6b3f20"/>
      <stop offset="80%" style="stop-color:#8a5c35"/>
      <stop offset="100%" style="stop-color:#4e2e10"/>
    </linearGradient>
    <linearGradient id="wood2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  style="stop-color:#7a4f2d;stop-opacity:0.6"/>
      <stop offset="50%" style="stop-color:#4e2e10;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#9c6d42;stop-opacity:0.5"/>
    </linearGradient>
    <linearGradient id="grain1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  style="stop-color:#3d2008;stop-opacity:0.25"/>
      <stop offset="25%" style="stop-color:#a06030;stop-opacity:0.15"/>
      <stop offset="50%" style="stop-color:#3d2008;stop-opacity:0.2"/>
      <stop offset="75%" style="stop-color:#c08050;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#3d2008;stop-opacity:0.3"/>
    </linearGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="2.5"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
    <filter id="softblur">
      <feGaussianBlur stdDeviation="1.2"/>
    </filter>
    <linearGradient id="cardGlass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  style="stop-color:rgba(255,240,220,0.22)"/>
      <stop offset="100%" style="stop-color:rgba(180,120,60,0.12)"/>
    </linearGradient>
    <linearGradient id="starFill" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"  style="stop-color:#f5a623"/>
      <stop offset="100%" style="stop-color:#f0c040"/>
    </linearGradient>
    <linearGradient id="btnGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"  style="stop-color:#8a4a18"/>
      <stop offset="100%" style="stop-color:#c07030"/>
    </linearGradient>
  </defs>

  <!-- Wood background base -->
  <rect width="800" height="500" fill="url(#wood1)"/>

  <!-- Wood grain streaks blurred -->
  <rect x="0" y="0" width="800" height="500" fill="url(#grain1)" filter="url(#blur2)"/>

  <!-- Horizontal grain lines -->
  <line x1="0" y1="45"  x2="800" y2="50"  stroke="#3d2008" stroke-width="6"  opacity="0.18" filter="url(#blur1)"/>
  <line x1="0" y1="90"  x2="800" y2="82"  stroke="#c08050" stroke-width="4"  opacity="0.12" filter="url(#blur1)"/>
  <line x1="0" y1="140" x2="800" y2="148" stroke="#3d2008" stroke-width="8"  opacity="0.15" filter="url(#blur1)"/>
  <line x1="0" y1="200" x2="800" y2="195" stroke="#a06030" stroke-width="5"  opacity="0.14" filter="url(#blur1)"/>
  <line x1="0" y1="260" x2="800" y2="268" stroke="#3d2008" stroke-width="7"  opacity="0.16" filter="url(#blur1)"/>
  <line x1="0" y1="320" x2="800" y2="315" stroke="#c08050" stroke-width="3"  opacity="0.10" filter="url(#blur1)"/>
  <line x1="0" y1="380" x2="800" y2="388" stroke="#3d2008" stroke-width="9"  opacity="0.18" filter="url(#blur1)"/>
  <line x1="0" y1="440" x2="800" y2="435" stroke="#a06030" stroke-width="5"  opacity="0.13" filter="url(#blur1)"/>

  <!-- Wood knot circles (blurred) -->
  <ellipse cx="120" cy="180" rx="40" ry="25" fill="none" stroke="#2e1505" stroke-width="5" opacity="0.25" filter="url(#blur2)"/>
  <ellipse cx="120" cy="180" rx="22" ry="13" fill="none" stroke="#2e1505" stroke-width="4" opacity="0.2"  filter="url(#blur2)"/>
  <ellipse cx="680" cy="350" rx="35" ry="20" fill="none" stroke="#2e1505" stroke-width="4" opacity="0.2"  filter="url(#blur2)"/>
  <ellipse cx="680" cy="350" rx="18" ry="10" fill="none" stroke="#2e1505" stroke-width="3" opacity="0.18" filter="url(#blur2)"/>

  <!-- Dark vignette overlay -->
  <rect width="800" height="500" fill="url(#wood2)" filter="url(#blur1)"/>

  <!-- Dark translucent overlay for readability -->
  <rect width="800" height="500" fill="rgba(20,8,0,0.42)"/>

  <!-- ── UI: Main card ── -->
  <rect x="80" y="55" width="640" height="390" rx="18" fill="url(#cardGlass)" stroke="rgba(255,210,160,0.18)" stroke-width="1.5"/>
  <rect x="80" y="55" width="640" height="390" rx="18" fill="rgba(0,0,0,0.35)"/>

  <!-- Top bar -->
  <rect x="80" y="55" width="640" height="52" rx="18" fill="rgba(90,45,10,0.7)"/>
  <rect x="80" y="89"  width="640" height="18" fill="rgba(90,45,10,0.7)"/>
  <text x="116" y="87" font-family="Georgia, serif" font-size="20" font-weight="700" fill="#f5deb3">Rate My Service</text>
  <rect x="588" y="68" width="110" height="28" rx="14" fill="url(#btnGrad)"/>
  <text x="604" y="87" font-family="Arial" font-size="11" font-weight="700" fill="#fff5e0">+ Add Review</text>

  <!-- Search bar -->
  <rect x="104" y="124" width="420" height="34" rx="8" fill="rgba(255,220,170,0.08)" stroke="rgba(200,150,80,0.35)" stroke-width="1"/>
  <text x="118" y="146" font-family="Arial" font-size="12" fill="rgba(245,222,179,0.45)">Search service providers...</text>
  <rect x="540" y="124" width="150" height="34" rx="8" fill="rgba(255,220,170,0.07)" stroke="rgba(200,150,80,0.3)" stroke-width="1"/>
  <text x="556" y="146" font-family="Arial" font-size="12" fill="rgba(245,222,179,0.5)">Category ▾</text>

  <!-- Review card 1 -->
  <rect x="104" y="176" width="186" height="240" rx="12" fill="rgba(255,230,180,0.07)" stroke="rgba(200,150,80,0.2)" stroke-width="1"/>
  <circle cx="197" cy="212" r="26" fill="rgba(138,74,24,0.5)" stroke="rgba(200,150,80,0.3)" stroke-width="1.5"/>
  <text x="184" y="218" font-family="Arial" font-size="20" fill="#f5deb3">👩</text>
  <text x="152" y="252" font-family="Georgia,serif" font-size="13" font-weight="700" fill="#f5deb3" text-anchor="middle" x="197">Sarah M.</text>
  <text x="197" y="252" font-family="Georgia,serif" font-size="13" font-weight="700" fill="#f5deb3" text-anchor="middle">Sarah M.</text>
  <text x="197" y="269" font-family="Arial" font-size="10" fill="rgba(245,222,179,0.55)" text-anchor="middle">Hair Stylist</text>
  <!-- stars -->
  <text x="159" y="291" font-family="Arial" font-size="16" fill="#f5a623">★★★★★</text>
  <text x="197" y="310" font-family="Arial" font-size="9" fill="rgba(245,222,179,0.5)" text-anchor="middle">"Absolutely amazing service!</text>
  <text x="197" y="322" font-family="Arial" font-size="9" fill="rgba(245,222,179,0.5)" text-anchor="middle">Will come back again."</text>
  <rect x="130" y="336" width="134" height="24" rx="6" fill="rgba(138,74,24,0.5)" stroke="rgba(200,150,80,0.25)" stroke-width="1"/>
  <text x="197" y="352" font-family="Arial" font-size="10" font-weight="600" fill="#f5deb3" text-anchor="middle">View Profile</text>
  <text x="197" y="395" font-family="Arial" font-size="9" fill="rgba(245,222,179,0.35)" text-anchor="middle">48 reviews</text>

  <!-- Review card 2 -->
  <rect x="307" y="176" width="186" height="240" rx="12" fill="rgba(255,230,180,0.1)" stroke="rgba(200,150,80,0.3)" stroke-width="1.5"/>
  <circle cx="400" cy="212" r="26" fill="rgba(138,74,24,0.5)" stroke="rgba(200,150,80,0.3)" stroke-width="1.5"/>
  <text x="387" y="218" font-family="Arial" font-size="20" fill="#f5deb3">🧔</text>
  <text x="400" y="252" font-family="Georgia,serif" font-size="13" font-weight="700" fill="#f5deb3" text-anchor="middle">James K.</text>
  <text x="400" y="269" font-family="Arial" font-size="10" fill="rgba(245,222,179,0.55)" text-anchor="middle">Plumber</text>
  <text x="362" y="291" font-family="Arial" font-size="16" fill="#f5a623">★★★★</text>
  <text x="446" y="291" font-family="Arial" font-size="16" fill="rgba(245,222,179,0.25)">★</text>
  <text x="400" y="310" font-family="Arial" font-size="9" fill="rgba(245,222,179,0.5)" text-anchor="middle">"Fixed everything quickly,</text>
  <text x="400" y="322" font-family="Arial" font-size="9" fill="rgba(245,222,179,0.5)" text-anchor="middle">great professional!"</text>
  <rect x="333" y="336" width="134" height="24" rx="6" fill="rgba(138,74,24,0.5)" stroke="rgba(200,150,80,0.25)" stroke-width="1"/>
  <text x="400" y="352" font-family="Arial" font-size="10" font-weight="600" fill="#f5deb3" text-anchor="middle">View Profile</text>
  <text x="400" y="395" font-family="Arial" font-size="9" fill="rgba(245,222,179,0.35)" text-anchor="middle">31 reviews</text>

  <!-- Review card 3 -->
  <rect x="510" y="176" width="186" height="240" rx="12" fill="rgba(255,230,180,0.07)" stroke="rgba(200,150,80,0.2)" stroke-width="1"/>
  <circle cx="603" cy="212" r="26" fill="rgba(138,74,24,0.5)" stroke="rgba(200,150,80,0.3)" stroke-width="1.5"/>
  <text x="590" y="218" font-family="Arial" font-size="20" fill="#f5deb3">👨‍💻</text>
  <text x="603" y="252" font-family="Georgia,serif" font-size="13" font-weight="700" fill="#f5deb3" text-anchor="middle">Alex T.</text>
  <text x="603" y="269" font-family="Arial" font-size="10" fill="rgba(245,222,179,0.55)" text-anchor="middle">Web Developer</text>
  <text x="565" y="291" font-family="Arial" font-size="16" fill="#f5a623">★★★★★</text>
  <text x="603" y="310" font-family="Arial" font-size="9" fill="rgba(245,222,179,0.5)" text-anchor="middle">"Delivered on time and</text>
  <text x="603" y="322" font-family="Arial" font-size="9" fill="rgba(245,222,179,0.5)" text-anchor="middle">beyond expectations!"</text>
  <rect x="536" y="336" width="134" height="24" rx="6" fill="rgba(138,74,24,0.5)" stroke="rgba(200,150,80,0.25)" stroke-width="1"/>
  <text x="603" y="352" font-family="Arial" font-size="10" font-weight="600" fill="#f5deb3" text-anchor="middle">View Profile</text>
  <text x="603" y="395" font-family="Arial" font-size="9" fill="rgba(245,222,179,0.35)" text-anchor="middle">62 reviews</text>

  <!-- Overall rating strip at bottom -->
  <rect x="80" y="415" width="640" height="30" rx="0" fill="rgba(50,22,5,0.6)"/>
  <rect x="80" y="427" width="640" height="18" rx="0" fill="rgba(50,22,5,0.6)"/>
  <rect x="80" y="415" width="640" height="30" rx="18" fill="rgba(50,22,5,0.6)"/>
  <rect x="80" y="415" width="640" height="18" fill="rgba(50,22,5,0.6)"/>
  <text x="180" y="436" font-family="Arial" font-size="11" fill="rgba(245,222,179,0.6)" text-anchor="middle">Overall Rating</text>
  <text x="260" y="436" font-family="Arial" font-size="13" fill="#f5a623">★★★★★</text>
  <text x="322" y="436" font-family="Arial" font-size="11" font-weight="700" fill="#f5deb3">4.8</text>
  <text x="420" y="436" font-family="Arial" font-size="11" fill="rgba(245,222,179,0.5)">|  2,340 total reviews</text>
  <text x="620" y="436" font-family="Arial" font-size="11" fill="rgba(245,222,179,0.5)">Page 1 of 12 »</text>
</svg>
